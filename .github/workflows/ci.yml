name: CI

on:
  push:
    branches:
      - main
      - cursor/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Compile JMH benchmarks
        run: ./gradlew :sqool-bench:jmhClasses --no-daemon

  benchmark:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run JMH benchmarks
        run: >
          ./gradlew :sqool-bench:jmh --no-daemon
          -Pjmh.rf=json
          -Pjmh.rff=build/reports/jmh/results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: build/reports/jmh/results.json
          retention-days: 90

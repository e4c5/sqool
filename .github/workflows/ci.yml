name: CI

on:
  push:
    branches:
      - main
      - cursor/**
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Compile JMH benchmarks
        run: ./gradlew :sqool-bench:jmhClasses --no-daemon
